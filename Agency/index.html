<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OSS AGENCY</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root {
            --bg-color: #0a0a0c;
            --card-bg: rgba(18, 18, 24, 0.8);
            /* Nuevo tono extraído exactamente de tu imagen image_979c62.png */
            --accent-color: #e59800; 
            --border-accent: rgba(229, 152, 0, 0.2);
            --glow-accent: rgba(229, 152, 0, 0.08);
            --text-main: #ffffff;
            --text-muted: #94a3b8;
            /* Color Naranja sutil para el título */
            --orange-soft: #f39c12; 
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at 50% 50%, #201602 0%, var(--bg-color) 70%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            padding: 20px;
            position: relative;
        }

        /* Título Principal Centrado Arriba */
        .top-title {
            position: absolute;
            top: 40px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: 5px;
            color: var(--orange-soft);
            text-transform: uppercase;
            text-align: center;
            z-index: 15;
            text-shadow: 0 4px 15px rgba(243, 156, 18, 0.2);
        }

        /* Contenedor Superior Izquierdo para el Logo y el Texto Animado */
        .brand-container {
            position: absolute;
            top: 30px;
            left: 40px;
            display: flex;
            align-items: center;
            height: 60px;
        }

        .logo-img {
            height: 60px;
            width: auto;
            z-index: 10;
            background-color: var(--bg-color);
        }

        /* Texto animado que se esconde detrás del logo */
        .brand-text {
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            background: linear-gradient(45deg, #fff, var(--accent-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            white-space: nowrap;
            z-index: 5;
            animation: esconderTexto 6s forwards ease-in-out;
            animation-delay: 1s;
        }

        @keyframes esconderTexto {
            0% {
                transform: translateX(15px);
                opacity: 0;
            }
            15% {
                transform: translateX(15px);
                opacity: 1;
            }
            70% {
                transform: translateX(15px);
                opacity: 1;
            }
            100% {
                transform: translateX(-100%);
                opacity: 0;
            }
        }

        .dashboard {
            width: 100%;
            max-width: 1100px;
            display: grid;
            grid-template-columns: 1.2fr 1fr;
            gap: 30px;
            z-index: 2;
            margin-top: 100px; /* Espacio para el título OSS AGENCY */
        }

        /* Tarjetas Profesionales */
        .card {
            background: var(--card-bg);
            border: 1px solid var(--border-accent);
            border-radius: 16px;
            padding: 40px;
            backdrop-filter: blur(10px);
            position: relative;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5), 0 0 50px var(--glow-accent);
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .card-total {
            border-left: 4px solid var(--accent-color);
        }

        .card h2 {
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-muted);
            margin-bottom: 20px;
            font-weight: 600;
        }

        .number-container {
            font-size: 3.8rem;
            font-weight: 700;
            letter-spacing: -1px;
            display: flex;
            align-items: center;
        }

        .currency-symbol {
            color: var(--accent-color);
            margin-left: 5px;
        }

        /* Sección del Gráfico */
        .chart-container {
            grid-column: 1 / -1;
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            padding: 24px;
            height: 220px;
        }

        @media (max-width: 768px) {
            .dashboard {
                grid-template-columns: 1fr;
                margin-top: 140px;
            }
            .number-container {
                font-size: 2.8rem;
            }
            .brand-container {
                position: relative;
                top: 0;
                left: 0;
                margin-bottom: 20px;
            }
            .top-title {
                top: 20px;
                width: 100%;
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>

    <div class="top-title">OSS AGENCY</div>

    <div class="brand-container">
        <img src="logo.png" alt="Logo" class="logo-img">
        <span class="brand-text">e-commerce</span>
    </div>

    <div class="dashboard">
        <div class="card card-total">
            <h2>Dinero destinado en total</h2>
            <div class="number-container">
                <span id="totalDisplay">100.002.131</span><span class="currency-symbol">€</span>
            </div>
        </div>

        <div class="card">
            <h2>Dinero que usted ha aportado</h2>
            <div class="number-container" style="color: #f8fafc;">
                <span id="aporteDisplay">231</span><span class="currency-symbol">€</span>
            </div>
        </div>

        <div class="chart-container">
            <canvas id="liveChart"></canvas>
        </div>
    </div>

    <script>
        let totalDinero = 100002131;
        const totalDisplay = document.getElementById('totalDisplay');

        // Configuración de Chart.js adaptado a la nueva paleta
        const ctx = document.getElementById('liveChart').getContext('2d');
        const liveChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['2023', '', '', '', ''],
                datasets: [{
                    label: 'Tendencia global de fondos (€)',
                    data: [100001800, 100001950, 100002010, 100002080, 100002131], 
                    borderColor: '#e59800', // Modificado al color exacto pedido
                    borderWidth: 2,
                    pointBackgroundColor: '#ffffff',
                    pointRadius: 3,
                    fill: true,
                    backgroundColor: 'rgba(229, 152, 0, 0.02)', // Sombra atenuada
                    tension: 0.3
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    x: { 
                        grid: { display: false }, 
                        ticks: { 
                            color: '#94a3b8',
                            font: { size: 12, weight: '600' }
                        } 
                    },
                    y: { grid: { color: 'rgba(255,255,255,0.03)' }, ticks: { color: '#64748b' } }
                }
            }
        });

        // Función de animación numérica suave
        function animateNumber(element, start, end, duration) {
            let startTimestamp = null;
            const step = (timestamp) => {
                if (!startTimestamp) startTimestamp = timestamp;
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                const currentVal = Math.floor(progress * (end - start) + start);
                element.textContent = currentVal.toLocaleString('de-DE');
                if (progress < 1) {
                    window.requestAnimationFrame(step);
                }
            };
            window.requestAnimationFrame(step);
        }

        // Intervalo de actualización cada 20 segundos
        setInterval(() => {
            const incremento = Math.floor(Math.random() * (90 - 15 + 1)) + 15;
            
            const totalAnterior = totalDinero;
            totalDinero += incremento;

            animateNumber(totalDisplay, totalAnterior, totalDinero, 2000);

            liveChart.data.datasets[0].data.push(totalDinero);
            liveChart.data.labels.push('');
            if(liveChart.data.datasets[0].data.length > 8) {
                liveChart.data.datasets[0].data.shift();
                liveChart.data.labels.shift();
                liveChart.data.labels[0] = '2023';
            }
            liveChart.update();

        }, 20000);
    </script>
</body>
</html>
